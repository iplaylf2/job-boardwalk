packages:
  - apps/*
  - packages/*
  - internal/*

nodeVersion: 26.5.0
engineStrict: true

strictPeerDependencies: true

# Temporary: dependency-cruiser 18.1 cannot analyze the workspace's TypeScript version.
# Remove this extension once the installed dependency-cruiser supports the catalog's
# TypeScript version, then verify `pnpm depcruise` cruises TypeScript modules rather than 0.
packageExtensions:
  dependency-cruiser@18:
    dependencies:
      typescript: 6.0.3

# External packages used by two or more workspace manifests belong in this catalog and use
# `catalog:`. A package used by one manifest keeps its version there; workspace packages use
# `workspace:*`.
catalog:
  "@hono/node-server": 2.0.11
  "@modelcontextprotocol/sdk": ^1.29.0
  "@shajara/host": ^0.11.0
  "@types/node": ^26.1.1
  arktype: ^2.2.3
  hono: 4.12.31
  oxlint: ^1.75.0
  tsx: ^4.23.1
  typescript: ^7.0.2
  vite: ^8.1.5
  vitest: ^4.1.10

catalogMode: prefer
cleanupUnusedCatalogs: true

allowBuilds:
  "@pnpm/exe": true
  esbuild: true
  oxfmt: true
  oxlint: true

minimumReleaseAge: 0
