packages:
  - apps/*
  - packages/*
  - internal/*

nodeVersion: 26.5.0
engineStrict: true

strictPeerDependencies: true

# Temporary: dependency-cruiser 18 cannot analyze the workspace's TypeScript version.
# Remove this extension once the installed dependency-cruiser supports the catalog's
# TypeScript version, then verify `pnpm depcruise` cruises TypeScript modules rather than 0.
packageExtensions:
  dependency-cruiser@18:
    dependencies:
      typescript: 6.0.3

catalog:
  "@hono/node-server": 2.0.8
  "@modelcontextprotocol/sdk": ^1.29.0
  "@shajara/host": ^0.11.0
  "@types/node": ^26.1.1
  hono: 4.12.29
  oxlint: ^1.73.0
  tsx: ^4.20.3
  typescript: ^7.0.2
  vite: ^8.1.4
  vitest: ^4.1.10

catalogMode: prefer
cleanupUnusedCatalogs: true

allowBuilds:
  esbuild: true
  oxfmt: true
  oxlint: true

minimumReleaseAgeExclude:
  - "@shajara/host@0.11.0"
  - "@shajara/kernel@0.11.0"
